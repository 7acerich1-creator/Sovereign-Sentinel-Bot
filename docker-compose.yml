version: "3.8"

services:
  gravity-claw:
    build: .
    container_name: gravity-claw
    restart: unless-stopped
    env_file: .env
    volumes:
      - gravity-data:/app/data
      - gravity-memory:/app/memory
      - gravity-skills:/app/skills
      - gravity-logs:/app/.agent/logs
    environment:
      - SQLITE_PATH=/app/data/gravity-claw.db
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('healthy')"]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3

volumes:
  gravity-data:
  gravity-memory:
  gravity-skills:
  gravity-logs:
