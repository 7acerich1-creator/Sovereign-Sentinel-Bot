<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0d0d2b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="50%" style="stop-color:#7b2ff7"/>
      <stop offset="100%" style="stop-color:#00f0ff"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="url(#glow)" stroke-width="4" opacity="0.3"/>

  <!-- Inner geometric shape — double S interlock -->
  <g transform="translate(512, 512)" filter="url(#neon)">
    <!-- Top S curve -->
    <path d="M-120,-180 C-120,-180 -60,-220 0,-180 C60,-140 120,-180 120,-180 L120,-80 C120,-80 60,-40 0,-80 C-60,-120 -120,-80 -120,-80 Z"
          fill="none" stroke="#00f0ff" stroke-width="8" stroke-linecap="round"/>
    <!-- Bottom S curve (inverted) -->
    <path d="M-120,80 C-120,80 -60,40 0,80 C60,120 120,80 120,80 L120,180 C120,180 60,220 0,180 C-60,140 -120,180 -120,180 Z"
          fill="none" stroke="#7b2ff7" stroke-width="8" stroke-linecap="round"/>
    <!-- Center diamond -->
    <polygon points="0,-40 40,0 0,40 -40,0" fill="none" stroke="#00f0ff" stroke-width="4"/>
    <polygon points="0,-20 20,0 0,20 -20,0" fill="#00f0ff" opacity="0.6"/>
  </g>

  <!-- Text -->
  <text x="512" y="780" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="72" fill="#e0e0e0" letter-spacing="12">SOVEREIGN</text>
  <text x="512" y="850" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="300" font-size="56" fill="#00f0ff" letter-spacing="18">SYNTHESIS</text>
</svg>
